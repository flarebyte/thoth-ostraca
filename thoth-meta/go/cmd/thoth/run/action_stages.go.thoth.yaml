    - Helper predicates keep this file focused on orchestration decisions rather than repeating metadata field checks inline.
  function_list:
    - PreparedActionStages
    - fileInfoEnabled
    - filterEnabled
    - gitEnabled
    - persistMetaEnabled
    - reduceEnabled
  import_files_list:
