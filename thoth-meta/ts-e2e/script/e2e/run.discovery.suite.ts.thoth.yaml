locator: script/e2e/run.discovery.suite.ts
meta:
  import_files_list:
    - ./helpers
    - ./test_utils
    - bun:test
    - node:fs
    - node:path
  language: typescript
  testcase_titles_list:
    - input-pipeline discovery include/exclude controls work deterministically
    - input-pipeline discovery skips unsafe paths by default
    - thoth run discovery followSymlinks handles symlink dirs and loops deterministically
